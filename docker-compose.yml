services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kulmi
      POSTGRES_PASSWORD: kulmi
      POSTGRES_DB: kulmi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kulmi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://kulmi:kulmi@db:5432/kulmi
    ports:
      - "3001:3001"

  main:
    build:
      context: ./main
      args:
        NEXT_PUBLIC_MAIN_URL: http://localhost:8391
        NEXT_PUBLIC_FIND_URL: http://localhost:4729
        NEXT_PUBLIC_FORUM_URL: http://localhost:6183
    restart: unless-stopped
    ports:
      - "8391:8391"

  find:
    build:
      context: ./find
      args:
        NEXT_PUBLIC_MAIN_URL: http://localhost:8391
        NEXT_PUBLIC_FIND_URL: http://localhost:4729
        NEXT_PUBLIC_FORUM_URL: http://localhost:6183
    restart: unless-stopped
    ports:
      - "4729:4729"

  forum:
    build:
      context: ./forum
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_MAIN_URL: http://localhost:8391
        NEXT_PUBLIC_FIND_URL: http://localhost:4729
        NEXT_PUBLIC_FORUM_URL: http://localhost:6183
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL_INTERNAL: http://backend:3001/api
    ports:
      - "6183:6183"

volumes:
  pgdata:
